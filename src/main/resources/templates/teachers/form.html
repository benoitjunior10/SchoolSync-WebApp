<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Professeur')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Professeur', ~{::section})}">
    <section>
        <div class="card">
            <div class="card-header">
                <div style="font-weight:800" th:text="${teacher.id == null ? 'Nouveau professeur' : 'Modifier professeur'}"></div>
                <a class="btn" data-tooltip="Retour" th:href="@{/teachers}"><span class="material-symbols-outlined mi-sm">arrow_back</span> Retour</a>
            </div>
            <div class="card-body">

                <form class="form" th:action="${teacher.id == null} ? @{/teachers} : @{/teachers/{id}(id=${teacher.id})}" method="post" th:object="${teacher}">
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                        <div th:each="e : ${#fields.errors('*')}" th:text="${e}"></div>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label>Matricule</label>
                            <input class="input" type="text" th:field="*{matricule}" />
                        </div>
                        <div class="field">
                            <label>Email</label>
                            <input class="input" type="email" th:field="*{email}" />
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label>Prénom</label>
                            <input class="input" type="text" th:field="*{firstName}" />
                        </div>
                        <div class="field">
                            <label>Nom</label>
                            <input class="input" type="text" th:field="*{lastName}" />
                        </div>
                    </div>

                    <div class="field">
                        <label>Téléphone</label>
                        <input class="input" type="text" th:field="*{phone}" />
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Enregistrer</button>
                        <a class="btn" th:href="@{/teachers}">Annuler</a>
                    </div>
                </form>

            </div>
        </div>
    </section>
</div>
</body>
</html>
