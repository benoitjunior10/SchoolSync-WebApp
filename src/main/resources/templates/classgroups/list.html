<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Classes')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Classes', ~{::section})}">
    <section>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">Liste des classes</div>
                    <div class="card-subtitle">
                        <span data-search-count="classgroups-table"
                              th:attr="data-total=${#lists.size(classGroups) + ' classe' + (#lists.size(classGroups) > 1 ? 's' : '')}"
                              th:text="${#lists.size(classGroups) + ' classe' + (#lists.size(classGroups) > 1 ? 's' : '')}"></span>
                    </div>
                </div>
                <a class="btn btn-primary" th:href="@{/class-groups/new}">
                    <span class="material-symbols-outlined mi-sm">add</span> Nouvelle classe
                </a>
            </div>
            <div class="search-bar">
                <div class="search-wrap">
                    <span class="material-symbols-outlined" style="font-size:18px;">search</span>
                    <input class="search-input" type="text" data-search="classgroups-table" placeholder="Rechercher par nom, niveau, programme…" />
                </div>
                <div class="per-page-wrap">Par page :
                    <select data-per-page="classgroups-table">
                        <option value="10" selected>10</option><option value="25">25</option><option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="card-body" style="padding:0">
                <div class="table-wrap" style="border:none;border-radius:0;box-shadow:none">
                    <table class="table table-mobile" id="classgroups-table" data-paginate="10">
                        <thead><tr><th>Nom</th><th>Niveau</th><th>Programme</th><th>Année</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="cg : ${classGroups}">
                            <td data-label="Nom" style="font-weight:600" th:text="${cg.name}"></td>
                            <td data-label="Niveau"><span class="badge" th:text="${cg.level}"></span></td>
                            <td data-label="Programme" class="muted" th:text="${cg.program}"></td>
                            <td data-label="Année" class="mono small" th:text="${cg.academicYear}"></td>
                            <td>
                                <div class="actions">
                                    <a class="btn btn-icon" data-tooltip="Modifier" th:href="@{/class-groups/{id}/edit(id=${cg.id})}"><span class="material-symbols-outlined">edit</span></a>
                                    <form th:action="@{/class-groups/{id}/delete(id=${cg.id})}" method="post" style="margin:0">
                                        <button class="btn btn-icon btn-danger" type="submit" data-confirm="Supprimer cette classe ?" data-tooltip="Supprimer"><span class="material-symbols-outlined">delete</span></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr data-empty>
                            <td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">
                                <span class="material-symbols-outlined" style="font-size:32px;opacity:.25;display:block;margin-bottom:8px">search</span>
                                Aucun résultat.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" data-pagination="classgroups-table">
                <div class="pagination-info"></div><div class="pagination-controls"></div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
