<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Inscription étudiant')}"></head>
<body>
<div class="auth-wrap">
    <div class="auth-card" style="grid-template-columns: 1fr">
        <div class="auth-right">
            <h1 class="auth-title">Inscription étudiant</h1>
            <p class="auth-sub">Créez votre compte en utilisant votre matricule.</p>

            <form class="form" th:action="@{/signup/student}" th:object="${form}" method="post">
                <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                    <div th:each="e : ${#fields.errors('*')}" th:text="${e}"></div>
                </div>

                <div class="field">
                    <label>Matricule</label>
                    <input class="input" type="text" th:field="*{matricule}" placeholder="ex: 2025001" />
                </div>
                <div class="field">
                    <label>Mot de passe</label>
                    <input class="input" type="password" th:field="*{password}" placeholder="6 caractères minimum" />
                </div>
                <div class="actions">
                    <button class="btn btn-primary" type="submit">Créer le compte</button>
                    <a class="btn" th:href="@{/login}"><span class="material-symbols-outlined mi-sm">arrow_back</span> Retour connexion</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
