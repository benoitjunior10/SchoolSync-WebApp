<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Erreur serveur')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Erreur serveur', ~{::section})}">
    <section>
        <div class="card">
            <div class="card-header">
                <div style="display:flex;align-items:center;gap:12px">
                    <span class="material-symbols-outlined" style="font-size:22px;color:var(--danger)">error</span>
                    <div>
                        <div class="card-title" style="color:var(--danger)">Erreur 500 — Erreur interne</div>
                        <div class="card-subtitle">Une erreur inattendue est survenue.</div>
                    </div>
                </div>
                <a class="btn btn-primary" th:href="@{/}">
                    <span class="material-symbols-outlined mi-sm">arrow_back</span>
                    Accueil
                </a>
            </div>
            <div class="card-body">
                <div class="alert alert-danger">
                    <div>
                        <div style="font-weight:700;margin-bottom:6px">Détails de l'erreur</div>
                        <div th:text="${message} ?: 'Une erreur inattendue est survenue. Veuillez réessayer.'"></div>
                        <div class="small" style="margin-top:8px;opacity:.7" th:text="${path}"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
