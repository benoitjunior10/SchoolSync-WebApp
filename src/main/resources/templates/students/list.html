<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Étudiants')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Étudiants', ~{::section})}">
    <section>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">Liste des étudiants</div>
                    <div class="card-subtitle">
                        <span data-search-count="students-table"
                              th:attr="data-total=${#lists.size(students) + ' étudiant' + (#lists.size(students) > 1 ? 's' : '')}"
                              th:text="${#lists.size(students) + ' étudiant' + (#lists.size(students) > 1 ? 's' : '')}"></span>
                    </div>
                </div>
                <a class="btn btn-primary" th:href="@{/students/new}">
                    <span class="material-symbols-outlined mi-sm">add</span> Nouvel étudiant
                </a>
            </div>
            <div class="search-bar">
                <div class="search-wrap">
                    <span class="material-symbols-outlined" style="font-size:18px;">search</span>
                    <input class="search-input" type="text" data-search="students-table" placeholder="Rechercher par nom, matricule, classe…" />
                </div>
                <div class="per-page-wrap">Par page :
                    <select data-per-page="students-table">
                        <option value="10" selected>10</option><option value="25">25</option><option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="card-body" style="padding:0">
                <div class="table-wrap" style="border:none;border-radius:0;box-shadow:none">
                    <table class="table table-mobile" id="students-table" data-paginate="10">
                        <thead>
                        <tr><th>Matricule</th><th>Nom complet</th><th>Classe</th><th>Email</th><th>Téléphone</th><th></th></tr>
                        </thead>
                        <tbody>
                        <tr th:each="s : ${students}">
                            <td data-label="Matricule"><span class="mono" style="font-size:12px;background:var(--surface-2);border:1px solid var(--border);padding:2px 8px;border-radius:6px" th:text="${s.matricule}"></span></td>
                            <td data-label="Nom" style="font-weight:500" th:text="${s.firstName + ' ' + s.lastName}"></td>
                            <td data-label="Classe">
                                <span th:if="${s.classGroup != null}" class="badge" th:text="${s.classGroup.name}"></span>
                                <span th:if="${s.classGroup == null}" class="muted">—</span>
                            </td>
                            <td data-label="Email" class="muted" th:text="${s.email}"></td>
                            <td data-label="Tél." class="muted" th:text="${s.phone}"></td>
                            <td>
                                <div class="actions">
                                    <a class="btn btn-icon" data-tooltip="Modifier" th:href="@{/students/{id}/edit(id=${s.id})}"><span class="material-symbols-outlined">edit</span></a>
                                    <a class="btn btn-icon" data-tooltip="Bulletin" th:href="@{/students/{id}/report(id=${s.id})}"><span class="material-symbols-outlined">description</span></a>
                                    <form th:action="@{/students/{id}/delete(id=${s.id})}" method="post" style="margin:0">
                                        <button class="btn btn-icon btn-danger" type="submit" data-confirm="Supprimer cet étudiant ?" data-tooltip="Supprimer"><span class="material-symbols-outlined">delete</span></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr data-empty>
                            <td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">
                                <span class="material-symbols-outlined" style="font-size:32px;opacity:.25;display:block;margin-bottom:8px">search</span>
                                Aucun résultat.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" data-pagination="students-table">
                <div class="pagination-info"></div>
                <div class="pagination-controls"></div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
