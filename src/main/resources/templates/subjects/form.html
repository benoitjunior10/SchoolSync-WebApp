<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Matière')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Matière', ~{::section})}">
    <section>
        <div class="card">
            <div class="card-header">
                <div style="font-weight:800" th:text="${subject.id == null ? 'Nouvelle matière' : 'Modifier matière'}"></div>
                <a class="btn" data-tooltip="Retour" th:href="@{/subjects}"><span class="material-symbols-outlined mi-sm">arrow_back</span> Retour</a>
            </div>
            <div class="card-body">

                <form class="form" th:action="${subject.id == null} ? @{/subjects} : @{/subjects/{id}(id=${subject.id})}" method="post" th:object="${subject}">
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                        <div th:each="e : ${#fields.errors('*')}" th:text="${e}"></div>
                    </div>

                    <div class="grid-2">
                        <div class="field">
                            <label>Code</label>
                            <input class="input" type="text" th:field="*{code}" />
                        </div>
                        <div class="field">
                            <label>Coefficient</label>
                            <input type="number" step="0.1" min="0" th:field="*{coefficient}" />
                        </div>
                    </div>

                    <div class="field">
                        <label>Nom</label>
                        <input class="input" type="text" th:field="*{name}" />
                    </div>

                    <div class="actions">
                        <button class="btn btn-primary" type="submit">Enregistrer</button>
                        <a class="btn" th:href="@{/subjects}">Annuler</a>
                    </div>
                </form>

            </div>
        </div>
    </section>
</div>
</body>
</html>
