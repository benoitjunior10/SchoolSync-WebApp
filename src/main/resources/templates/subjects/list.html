<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Matières')}"></head>
<body>
<div th:replace="~{fragments/layout :: shell('Matières', ~{::section})}">
    <section>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div class="card">
            <div class="card-header">
                <div>
                    <div class="card-title">Liste des matières</div>
                    <div class="card-subtitle">
                        <span data-search-count="subjects-table"
                              th:attr="data-total=${#lists.size(subjects) + ' matière' + (#lists.size(subjects) > 1 ? 's' : '')}"
                              th:text="${#lists.size(subjects) + ' matière' + (#lists.size(subjects) > 1 ? 's' : '')}"></span>
                    </div>
                </div>
                <a class="btn btn-primary" th:href="@{/subjects/new}">
                    <span class="material-symbols-outlined mi-sm">add</span> Nouvelle matière
                </a>
            </div>
            <div class="search-bar">
                <div class="search-wrap">
                    <span class="material-symbols-outlined" style="font-size:18px;">search</span>
                    <input class="search-input" type="text" data-search="subjects-table" placeholder="Rechercher par code, nom…" />
                </div>
                <div class="per-page-wrap">Par page :
                    <select data-per-page="subjects-table">
                        <option value="10" selected>10</option><option value="25">25</option><option value="50">50</option>
                    </select>
                </div>
            </div>
            <div class="card-body" style="padding:0">
                <div class="table-wrap" style="border:none;border-radius:0;box-shadow:none">
                    <table class="table table-mobile" id="subjects-table" data-paginate="10">
                        <thead><tr><th>Code</th><th>Nom</th><th>Coefficient</th><th></th></tr></thead>
                        <tbody>
                        <tr th:each="s : ${subjects}">
                            <td data-label="Code"><span class="badge badge-admin" th:text="${s.code}"></span></td>
                            <td data-label="Nom" style="font-weight:500" th:text="${s.name}"></td>
                            <td data-label="Coeff." class="mono" th:text="${s.coefficient}"></td>
                            <td>
                                <div class="actions">
                                    <a class="btn btn-icon" data-tooltip="Modifier" th:href="@{/subjects/{id}/edit(id=${s.id})}"><span class="material-symbols-outlined">edit</span></a>
                                    <form th:action="@{/subjects/{id}/delete(id=${s.id})}" method="post" style="margin:0">
                                        <button class="btn btn-icon btn-danger" type="submit" data-confirm="Supprimer cette matière ?" data-tooltip="Supprimer"><span class="material-symbols-outlined">delete</span></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr data-empty>
                            <td colspan="4" style="text-align:center;padding:32px;color:var(--muted)">
                                <span class="material-symbols-outlined" style="font-size:32px;opacity:.25;display:block;margin-bottom:8px">search</span>
                                Aucun résultat.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="pagination" data-pagination="subjects-table">
                <div class="pagination-info"></div><div class="pagination-controls"></div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
